name: DigitalPlat Auto Renew

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run renewal check
        env:
          DIGITALPLAT_API_TOKEN: ${{ secrets.DIGITALPLAT_API_TOKEN }}
          DIGITALPLAT_DOMAINS: ${{ vars.DIGITALPLAT_DOMAINS }}
          DIGITALPLAT_API_BASE: ${{ vars.DIGITALPLAT_API_BASE }}
          DIGITALPLAT_RENEW_BEFORE_DAYS: ${{ vars.DIGITALPLAT_RENEW_BEFORE_DAYS }}
          DIGITALPLAT_RENEWAL_TYPE: ${{ vars.DIGITALPLAT_RENEWAL_TYPE }}
          DIGITALPLAT_RENEWAL_YEARS: ${{ vars.DIGITALPLAT_RENEWAL_YEARS }}
        run: |
          python scripts/digitalplat_auto_renew.py --state state/domains-state.json

      - name: Commit updated renewal state
        run: |
          if git diff --quiet -- state/domains-state.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/domains-state.json
          git commit -m "chore: update DigitalPlat renewal state"
          git push
